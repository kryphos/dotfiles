general {
    gaps_in = 3
    gaps_out = 5
    border_size = 1
    col.active_border = rgb(BC2421) rgb(10A7B0) rgb(040227) 45deg
    col.inactive_border = rgba(00000000)
    layout = dwindle
}

decoration {
    rounding = 5

    blur {
        enabled = false
        size = 1
        passes = 1
        vibrancy = 0.1720
    }

    drop_shadow = true
    shadow_range = 7
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 2, myBezier
    animation = windowsOut, 1, 2, default
    animation = workspaces, 1, 1, default
}
