backend = "glx";
use-damage = false;
vsync = true

shadow = true;
shadow-radius = 13;

menu          = { shadow = false; };
dropdown_menu = { shadow = false; };
popup_menu    = { shadow = false; };
utility       = { shadow = false; };

corner-radius = 4;

opacity-rule = [
  "90:class_g = 'discord'",
  "75:class_g = 'Spotify'",
];

unredir-if-possible = false;
